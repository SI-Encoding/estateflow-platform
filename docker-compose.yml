version: "3.9"

services:
  db:
    image: postgres:15
    container_name: estateflow-db
    restart: always
    environment:
      POSTGRES_DB: estateflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: EstateFlow.API/Dockerfile
    container_name: estateflow-api
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=estateflow;Username=postgres;Password=postgres
    ports:
      - "5055:8080"
  web:
    image: node:20
    container_name: estateflow-web
    working_dir: /app
    volumes:
    - ./web:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
    - "5173:5173"
    depends_on:
    - api
volumes:
  postgres_data: